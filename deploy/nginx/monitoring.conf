# ============================================================
# HFT STEALTH SYSTEM - NGINX MONITORING PROXY
# ============================================================

server {
    listen 8080;
    server_name monitoring.hft-stealth.local;
    
    # Authentication (basic auth for production)
    auth_basic "HFT Monitoring";
    auth_basic_user_file /etc/nginx/.htpasswd;
    
    # SSL (production)
    listen 443 ssl http2;
    ssl_certificate /etc/ssl/hft/cert.pem;
    ssl_certificate_key /etc/ssl/hft/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    
    # Logging
    access_log /var/log/nginx/hft-monitoring-access.log;
    error_log /var/log/nginx/hft-monitoring-error.log;
    
    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=monitoring:10m rate=10r/s;
    limit_req zone=monitoring burst=20 nodelay;
    
    # Metrics endpoint (Prometheus)
    location /metrics {
        proxy_pass http://127.0.0.1:9090/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Allow access without auth for Prometheus
        auth_basic off;
    }
    
    # Health check endpoint
    location /health {
        proxy_pass http://127.0.0.1:9090/health;
        proxy_set_header Host $host;
        access_log off;
        auth_basic off;
    }
    
    # Dashboard WebSocket
    location /ws {
        proxy_pass http://127.0.0.1:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
    
    # Dashboard static files
    location / {
        proxy_pass http://127.0.0.1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1d;
            add_header Cache-Control "public, immutable";
        }
    }
    
    # Grafana (if using)
    location /grafana/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name monitoring.hft-stealth.local;
    return 301 https://$server_name$request_uri;
}
